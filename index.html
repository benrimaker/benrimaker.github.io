<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BenriMaker</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f9f9f7;
      --text: #1a1a1a;
      --muted: #888;
      --border: #e0e0d8;
      --accent: #2a2a2a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 3rem 4rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .site-title {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    main {
      flex: 1;
      padding: 5rem 4rem;
      max-width: 720px;
    }

    .hero {
      margin-bottom: 5rem;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.125rem;
      color: var(--muted);
      font-weight: 400;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .apps {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .app-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 0;
      border-top: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: opacity 0.15s ease;
    }

    .app-item:last-child {
      border-bottom: 1px solid var(--border);
    }

    .app-item:hover {
      opacity: 0.6;
    }

    .app-name {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .app-arrow {
      color: var(--muted);
      font-size: 0.875rem;
    }

    .app-item.no-link {
      cursor: default;
    }

    .app-item.no-link:hover {
      opacity: 1;
    }

    .app-tag {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--border);
      padding: 0.2em 0.6em;
      border-radius: 4px;
    }

    footer {
      padding: 2rem 4rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      header, main, footer {
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }
      main {
        padding-top: 3rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="site-title">BenriMaker</div>
  </header>

  <main>
    <section class="hero">
      <h1>BenriMaker</h1>
      <p>We make something Benri</p>
    </section>

    <section>
      <p class="section-label" style="text-transform: none;">BenriApps Project</p>
      <div class="apps">
        <a class="app-item" href="https://routam.app/" target="_blank" rel="noopener">
          <span class="app-name">ルータム</span>
          <span class="app-arrow">→</span>
        </a>
        <a class="app-item" href="https://apps.apple.com/jp/app/%E3%81%84%E3%81%BE%E4%BD%95%E5%88%86%E3%81%82%E3%81%A8%E4%BD%95%E5%88%86/id6761005371" target="_blank" rel="noopener">
          <span class="app-name">いま何分あと何分</span>
          <span class="app-arrow">→</span>
        </a>
      </div>
    </section>
  </main>

  <footer>
    &copy; BenriMaker
  </footer>

</body>
</html>
